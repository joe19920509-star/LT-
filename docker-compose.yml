services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ltmagazine
    ports:
      - "5432:5432"
    volumes:
      - lt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ltmagazine"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  lt_pgdata:
